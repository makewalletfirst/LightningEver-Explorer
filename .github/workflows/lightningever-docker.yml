# LightningEver Explorer — build & publish Docker image to Docker Hub.
#
# Triggers on push to 260530 / main (and workflow_dispatch).
# Tags pushed (if Docker Hub secrets are present):
#   silverruler/lightningever-explorer:<branch>     :260530, :main
#   silverruler/lightningever-explorer:sha-<7>      every build
#   silverruler/lightningever-explorer:latest       only on main
#
# Required repo secrets:
#   DOCKERHUB_USERNAME   = silverruler
#   DOCKERHUB_TOKEN      = <Docker Hub access token>
# Missing secrets → the job builds anyway but skips push (CI stays green).

name: LightningEver Docker

on:
  push:
    branches: [ "260530", "main" ]
  workflow_dispatch:

concurrency:
  group: lightningever-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Docker Hub credentials
        id: creds
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "have_creds=true"  >> "$GITHUB_OUTPUT"
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets not set — image will be built but not pushed."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.creds.outputs.have_creds == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          REF="${GITHUB_REF_NAME}"
          SHA="${GITHUB_SHA:0:7}"
          IMAGE="silverruler/lightningever-explorer"
          TAGS="${IMAGE}:${REF},${IMAGE}:sha-${SHA}"
          if [ "${REF}" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build (and push if creds present)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.creds.outputs.have_creds == 'true' }}
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
